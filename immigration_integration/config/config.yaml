model:
  gradient_descent:
    learning_rate: 0.01
    iterations: 2000
    tolerance: 1.0e-7
  
  random_forest:
    n_estimators: 200
    max_depth: 15
    random_state: 42
  
  test_size: 0.2
  cross_validation_folds: 5
